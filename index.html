<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Probate los lentes – Auré</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F7F4F0; color: #1a1a18; min-height: 100vh; }

  #screen-launch { padding: 32px 20px; max-width: 440px; margin: 0 auto; text-align: center; }
  #screen-launch h1 { font-size: 26px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 8px; }
  #screen-launch p { font-size: 13px; color: #888780; line-height: 1.6; margin-bottom: 32px; }

  .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; }
  .model-btn { background: #fff; border: 1.5px solid #ddd8ce; border-radius: 12px; padding: 14px 6px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 7px; transition: border-color .15s; -webkit-appearance: none; }
  .model-btn.selected { border-color: #c8a96e; background: #fdf8ef; }
  .model-btn .mname { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #5F5E5A; font-weight: 500; }
  .model-btn .mprice { font-size: 11px; color: #aaa; }

  .start-btn { width: 100%; background: #1a1a18; color: #F7F4F0; border: none; padding: 17px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 10px; font-family: inherit; }
  .start-btn:disabled { opacity: 0.35; }

  #screen-loading { display: none; padding: 60px 20px; text-align: center; }
  .spinner { width: 36px; height: 36px; border: 2.5px solid #ddd8ce; border-top-color: #c8a96e; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #screen-loading p { font-size: 13px; color: #888780; letter-spacing: 1px; }
  #load-error { display: none; font-size: 13px; color: #c0392b; margin-top: 12px; line-height: 1.5; }

  #screen-tryon { display: none; }
  .video-wrap { position: relative; width: 100%; max-width: 440px; margin: 0 auto; background: #000; }
  #vid { width: 100%; display: block; transform: scaleX(-1); }
  #cvs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

  .tryon-bottom { max-width: 440px; margin: 0 auto; padding: 14px 16px 24px; }
  .status { font-size: 12px; color: #888780; text-align: center; margin-bottom: 12px; letter-spacing: 0.5px; min-height: 16px; }

  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .pill { padding: 7px 13px; border-radius: 99px; border: 0.5px solid #ddd8ce; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: #fff; color: #5F5E5A; font-family: inherit; -webkit-appearance: none; }
  .pill.active { background: #1a1a18; color: #F7F4F0; border-color: #1a1a18; }

  .size-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 0.5px solid #ddd8ce; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .size-row label { font-size: 12px; color: #888780; letter-spacing: 1px; flex: 1; }
  .size-row input { flex: 2; accent-color: #c8a96e; }
  .size-row span { font-size: 12px; font-weight: 500; width: 34px; text-align: right; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .ctrl { padding: 12px 6px; border-radius: 8px; border: 0.5px solid #ddd8ce; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: #fff; color: #5F5E5A; font-family: inherit; -webkit-appearance: none; }
  .ctrl.gold { background: #c8a96e; border-color: #c8a96e; color: #1a1a18; font-weight: 500; }

  #manual-hint { display: none; background: #fff8ec; border: 0.5px solid #f0d080; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: #7a5c00; line-height: 1.5; }
</style>
</head>
<body>

<div id="screen-launch">
  <h1>Auré</h1>
  <p>Elegí un modelo y probátelo con<br>la cámara de tu celular</p>
  <div class="model-grid" id="mgrid"></div>
  <button class="start-btn" id="startbtn" disabled onclick="startTryOn()">Iniciar prueba virtual</button>
</div>

<div id="screen-loading">
  <div class="spinner"></div>
  <p id="load-msg">Iniciando cámara...</p>
  <p id="load-error"></p>
</div>

<div id="screen-tryon">
  <div class="video-wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="cvs"></canvas>
  </div>
  <div class="tryon-bottom">
    <div class="status" id="status">Centrá tu cara en la cámara</div>
    <div id="manual-hint">No se detectó la cara automáticamente. Usá los controles de abajo para posicionar los lentes manualmente.</div>
    <div class="pill-row" id="pillrow"></div>
    <div class="size-row">
      <label>Tamaño</label>
      <input type="range" id="szslider" min="50" max="180" value="100" step="1" oninput="sz=+this.value;document.getElementById('szout').textContent=this.value+'%'">
      <span id="szout">100%</span>
    </div>
    <div class="size-row" id="yrow" style="display:none">
      <label>Posición</label>
      <input type="range" id="yslider" min="-100" max="100" value="0" step="1" oninput="manualY=+this.value">
      <span></span>
    </div>
    <div class="btn-row">
      <button class="ctrl" onclick="snap()">Foto</button>
      <button class="ctrl" onclick="stopTryOn()">Cerrar</button>
      <button class="ctrl gold" onclick="buy()">Comprar</button>
    </div>
  </div>
</div>

<script>
const MODELS = [
  { id:'terra',   name:'Terra',   price:'$94.999', url:'https://auresunglasses.com.ar/productos/terra',   color:'#8B6914' },
  { id:'noir',    name:'Noir',    price:'$94.999', url:'https://auresunglasses.com.ar/productos/noir',    color:'#1a1a18' },
  { id:'lumen',   name:'Lumen',   price:'$84.999', url:'https://auresunglasses.com.ar/productos/lumen',   color:'#C8A96E' },
  { id:'eclipse', name:'Eclipse', price:'$94.999', url:'https://auresunglasses.com.ar/productos/eclipse', color:'#3A3A38' },
  { id:'sol',     name:'Sol',     price:'$89.999', url:'https://auresunglasses.com.ar/productos/sol',     color:'#B5860D' },
  { id:'dusk',    name:'Dusk',    price:'$94.999', url:'https://auresunglasses.com.ar/productos/dusk',    color:'#5A4A3A' }
];

let sel = null, sz = 100, manualY = 0;
let stream = null, raf = null, detector = null;
let lastFace = null, noFaceCount = 0, manualMode = false;

function frameSVG(m, w, h) {
  const c = m.color;
  const s = {
    terra:`<rect x="4" y="10" width="44" height="28" rx="10" stroke="${c}" stroke-width="3" fill="none"/><rect x="72" y="10" width="44" height="28" rx="10" stroke="${c}" stroke-width="3" fill="none"/><line x1="48" y1="24" x2="72" y2="24" stroke="${c}" stroke-width="2.5"/><line x1="4" y1="24" x2="0" y2="18" stroke="${c}" stroke-width="2.5"/><line x1="116" y1="24" x2="120" y2="18" stroke="${c}" stroke-width="2.5"/>`,
    noir:`<rect x="4" y="12" width="44" height="24" rx="4" stroke="${c}" stroke-width="3" fill="none"/><rect x="72" y="12" width="44" height="24" rx="4" stroke="${c}" stroke-width="3" fill="none"/><line x1="48" y1="24" x2="72" y2="24" stroke="${c}" stroke-width="2.5"/><line x1="4" y1="24" x2="0" y2="18" stroke="${c}" stroke-width="2.5"/><line x1="116" y1="24" x2="120" y2="18" stroke="${c}" stroke-width="2.5"/>`,
    lumen:`<ellipse cx="26" cy="24" rx="22" ry="14" stroke="${c}" stroke-width="3" fill="none"/><ellipse cx="94" cy="24" rx="22" ry="14" stroke="${c}" stroke-width="3" fill="none"/><line x1="48" y1="24" x2="72" y2="24" stroke="${c}" stroke-width="2.5"/><line x1="4" y1="24" x2="0" y2="18" stroke="${c}" stroke-width="2.5"/><line x1="116" y1="24" x2="120" y2="18" stroke="${c}" stroke-width="2.5"/>`,
    eclipse:`<path d="M4 28 Q26 6 48 24" stroke="${c}" stroke-width="3" fill="none"/><path d="M72 24 Q94 6 116 28" stroke="${c}" stroke-width="3" fill="none"/><line x1="48" y1="24" x2="72" y2="24" stroke="${c}" stroke-width="2.5"/><line x1="4" y1="28" x2="0" y2="22" stroke="${c}" stroke-width="2.5"/><line x1="116" y1="28" x2="120" y2="22" stroke="${c}" stroke-width="2.5"/>`,
    sol:`<rect x="8" y="8" width="40" height="32" rx="14" stroke="${c}" stroke-width="3" fill="none"/><rect x="72" y="8" width="40" height="32" rx="14" stroke="${c}" stroke-width="3" fill="none"/><line x1="48" y1="24" x2="72" y2="24" stroke="${c}" stroke-width="2.5"/><line x1="8" y1="24" x2="0" y2="18" stroke="${c}" stroke-width="2.5"/><line x1="112" y1="24" x2="120" y2="18" stroke="${c}" stroke-width="2.5"/>`,
    dusk:`<polygon points="6,12 42,12 50,24 42,36 6,36 0,24" stroke="${c}" stroke-width="2.5" fill="none"/><polygon points="70,12 106,12 120,24 106,36 70,36 62,24" stroke="${c}" stroke-width="2.5" fill="none"/><line x1="50" y1="24" x2="62" y2="24" stroke="${c}" stroke-width="2.5"/>`
  };
  return `<svg width="${w}" height="${h}" viewBox="0 0 120 48" fill="none">${s[m.id]||s.terra}</svg>`;
}

function buildUI() {
  const grid = document.getElementById('mgrid');
  const pills = document.getElementById('pillrow');
  MODELS.forEach(m => {
    const b = document.createElement('button');
    b.className = 'model-btn'; b.dataset.id = m.id;
    b.innerHTML = frameSVG(m,72,36) + `<span class="mname">${m.name}</span><span class="mprice">${m.price}</span>`;
    b.onclick = () => pick(m.id);
    grid.appendChild(b);
    const p = document.createElement('button');
    p.className = 'pill'; p.dataset.id = m.id; p.textContent = m.name;
    p.onclick = () => pick(m.id);
    pills.appendChild(p);
  });
}

function pick(id) {
  sel = id;
  document.querySelectorAll('.model-btn').forEach(b => b.classList.toggle('selected', b.dataset.id===id));
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.id===id));
  document.getElementById('startbtn').disabled = false;
}

function show(id) {
  ['screen-launch','screen-loading','screen-tryon'].forEach(s => {
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

async function startTryOn() {
  if (!sel) return;
  show('screen-loading');
  document.getElementById('load-error').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:640}, height:{ideal:480} }
    });
    const vid = document.getElementById('vid');
    vid.srcObject = stream;
    await new Promise(r => { vid.onloadedmetadata = r; });
    await vid.play();
    document.getElementById('load-msg').textContent = 'Cargando detección facial...';
    await loadDetector();
    show('screen-tryon');
    loop();
  } catch(e) {
    document.getElementById('load-error').style.display = 'block';
    document.getElementById('load-error').textContent =
      e.name === 'NotAllowedError'
        ? 'Permiso de cámara denegado. Andá a Configuración > Safari > Cámara y permitilo.'
        : 'No se pudo iniciar la cámara: ' + e.message;
    setTimeout(() => show('screen-launch'), 4000);
  }
}

async function loadDetector() {
  if (detector) return;
  return new Promise((res) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';
    s.onload = async () => {
      try {
        const BASE = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(BASE),
          faceapi.nets.faceLandmark68TinyNet.loadFromUri(BASE)
        ]);
        detector = 'faceapi';
      } catch(e) { detector = 'manual'; }
      res();
    };
    s.onerror = () => { detector = 'manual'; res(); };
    document.head.appendChild(s);
  });
}

async function loop() {
  if (!stream) return;
  const vid = document.getElementById('vid');
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const status = document.getElementById('status');
  cvs.width = vid.videoWidth || 640;
  cvs.height = vid.videoHeight || 480;
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  if (detector === 'faceapi' && typeof faceapi !== 'undefined') {
    try {
      const det = await faceapi
        .detectSingleFace(vid, new faceapi.TinyFaceDetectorOptions({inputSize:224, scoreThreshold:0.3}))
        .withFaceLandmarks(true);
      if (det) {
        lastFace = det; noFaceCount = 0; manualMode = false;
        document.getElementById('manual-hint').style.display = 'none';
        document.getElementById('yrow').style.display = 'none';
        status.textContent = '✓ Cara detectada';
        drawOnFace(ctx, det, cvs.width, cvs.height);
      } else {
        noFaceCount++;
        if (noFaceCount > 30) {
          manualMode = true;
          document.getElementById('manual-hint').style.display = 'block';
          document.getElementById('yrow').style.display = 'flex';
          status.textContent = 'Mirá directo a la cámara con buena luz';
          drawManual(ctx, cvs.width, cvs.height);
        } else if (lastFace) {
          drawOnFace(ctx, lastFace, cvs.width, cvs.height);
        }
      }
    } catch(e) { drawManual(ctx, cvs.width, cvs.height); }
  } else {
    manualMode = true;
    document.getElementById('manual-hint').style.display = 'block';
    document.getElementById('yrow').style.display = 'flex';
    status.textContent = 'Modo manual activo';
    drawManual(ctx, cvs.width, cvs.height);
  }
  raf = requestAnimationFrame(loop);
}

function drawOnFace(ctx, det, cw, ch) {
  const lm = det.landmarks;
  const lEye = lm.getLeftEye(), rEye = lm.getRightEye();
  const lx = lEye.reduce((s,p)=>s+p.x,0)/lEye.length;
  const ly = lEye.reduce((s,p)=>s+p.y,0)/lEye.length;
  const rx = rEye.reduce((s,p)=>s+p.x,0)/rEye.length;
  const ry = rEye.reduce((s,p)=>s+p.y,0)/rEye.length;
  const dist = Math.hypot(rx-lx, ry-ly);
  const fw = dist * 2.8 * (sz/100), fh = fw * 0.42;
  const cx = (lx+rx)/2, cy = (ly+ry)/2;
  const angle = Math.atan2(ry-ly, rx-lx);
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
  drawFrame(ctx, fw, fh); ctx.restore();
}

function drawManual(ctx, cw, ch) {
  const cx = cw/2, cy = ch/2 + manualY;
  const fw = cw * 0.55 * (sz/100), fh = fw * 0.42;
  ctx.save(); ctx.translate(cx, cy); drawFrame(ctx, fw, fh); ctx.restore();
  ctx.strokeStyle = 'rgba(200,169,110,0.4)'; ctx.lineWidth = 1.5; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.ellipse(cx, cy + ch*0.42*0.15, cw*0.3, ch*0.42, 0, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawFrame(ctx, fw, fh) {
  const m = MODELS.find(x=>x.id===sel); if (!m) return;
  const c = m.color, lw = Math.max(1.5, fw*0.055);
  const lensW = fw*0.42, lensH = fh, gap = fw*0.06;
  const lx = -(gap/2+lensW/2), rx = gap/2+lensW/2;
  ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const shapes = {
    terra: () => { rRect(ctx,lx-lensW/2,-lensH/2,lensW,lensH,lensH*0.45); rRect(ctx,rx-lensW/2,-lensH/2,lensW,lensH,lensH*0.45); },
    noir:  () => { rRect(ctx,lx-lensW/2,-lensH/2,lensW,lensH,lensH*0.1);  rRect(ctx,rx-lensW/2,-lensH/2,lensW,lensH,lensH*0.1); },
    lumen: () => { oval(ctx,lx,0,lensW/2,lensH/2); oval(ctx,rx,0,lensW/2,lensH/2); },
    eclipse:()=> {
      ctx.beginPath(); ctx.moveTo(lx-lensW/2,lensH*0.3); ctx.quadraticCurveTo(lx,-(lensH*0.7),lx+lensW/2,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx-lensW/2,0); ctx.quadraticCurveTo(rx,-(lensH*0.7),rx+lensW/2,lensH*0.3); ctx.stroke();
    },
    sol:  () => { rRect(ctx,lx-lensW/2,-lensH/2,lensW,lensH,lensH*0.65); rRect(ctx,rx-lensW/2,-lensH/2,lensW,lensH,lensH*0.65); },
    dusk: () => { hex(ctx,lx,0,lensW,lensH); hex(ctx,rx,0,lensW,lensH); }
  };
  (shapes[sel]||shapes.terra)();
  ctx.beginPath(); ctx.moveTo(lx+lensW/2,0); ctx.lineTo(rx-lensW/2,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx-lensW/2,0); ctx.lineTo(lx-lensW/2-fw*0.12,-fh*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx+lensW/2,0); ctx.lineTo(rx+lensW/2+fw*0.12,-fh*0.2); ctx.stroke();
  ctx.globalAlpha = 0.13; ctx.fillStyle = c;
  if (sel==='lumen') { fillOval(ctx,lx,0,lensW/2,lensH/2); fillOval(ctx,rx,0,lensW/2,lensH/2); }
  else { fillRRect(ctx,lx-lensW/2,-lensH/2,lensW,lensH,sel==='noir'?lensH*0.1:sel==='sol'?lensH*0.65:lensH*0.45); fillRRect(ctx,rx-lensW/2,-lensH/2,lensW,lensH,sel==='noir'?lensH*0.1:sel==='sol'?lensH*0.65:lensH*0.45); }
  ctx.globalAlpha = 1;
}

function rRect(ctx,x,y,w,h,r){ctx.beginPath();rRectPath(ctx,x,y,w,h,r);ctx.stroke();}
function fillRRect(ctx,x,y,w,h,r){ctx.beginPath();rRectPath(ctx,x,y,w,h,r);ctx.fill();}
function rRectPath(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function oval(ctx,cx,cy,rx,ry){ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();}
function fillOval(ctx,cx,cy,rx,ry){ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();}
function hex(ctx,cx,cy,fw,fh){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;ctx.lineTo(cx+fw/2*Math.cos(a)*0.9,cy+fh/2*Math.sin(a));}ctx.closePath();ctx.stroke();}

function snap() {
  const vid = document.getElementById('vid'), cvs = document.getElementById('cvs');
  const out = document.createElement('canvas');
  out.width = vid.videoWidth; out.height = vid.videoHeight;
  const ctx = out.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(vid,-out.width,0); ctx.restore();
  ctx.drawImage(cvs,0,0);
  const a = document.createElement('a');
  a.download = 'aure-'+sel+'.jpg'; a.href = out.toDataURL('image/jpeg',0.92); a.click();
}

function stopTryOn() {
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; raf=null; lastFace=null; noFaceCount=0; manualMode=false;
  document.getElementById('manual-hint').style.display='none';
  document.getElementById('yrow').style.display='none';
  show('screen-launch');
}

function buy() {
  const m = MODELS.find(x=>x.id===sel);
  if (m) window.location.href = m.url;
}

buildUI();
</script>
</body>
</html>
